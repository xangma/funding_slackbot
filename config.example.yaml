sources:
  - id: ukri_rss
    type: rss
    url: https://www.ukri.org/opportunity/feed/
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: wellcome_schemes
    type: wellcome_cms_schemes
    url: https://cms.wellcome.org/sitemap.xml
    enabled: true
    cms_base_url: https://cms.wellcome.org
    max_schemes: 60
    max_workers: 6
    timeout_seconds: 10
    retry_attempts: 1
    retry_backoff_seconds: 1
  - id: leverhulme_listings
    type: leverhulme_listings
    url: https://www.leverhulme.ac.uk/listings
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: innovation_funding_search
    type: innovation_funding_search
    url: https://apply-for-innovation-funding.service.gov.uk/competition/search
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: aria_funding_opportunities
    type: aria_funding_opportunities
    url: https://aria.org.uk/funding-opportunities
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: british_academy_funding
    type: british_academy_funding
    url: https://www.thebritishacademy.ac.uk/funding/
    enabled: false
    # British Academy site is Cloudflare-protected for non-browser requests.
    # Enable once a stable public endpoint is available.
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: nihr_funding_opportunities
    type: nihr_funding_opportunities
    url: https://www.nihr.ac.uk/funding-opportunities
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: cancer_research_horizons_funding
    type: cancer_research_horizons_funding
    url: https://www.cancerresearchhorizons.com/researchers/access-funding
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: horizon_europe_funding
    type: horizon_europe_funding
    url: https://api.tech.ec.europa.eu/search-api/prod/rest/search
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
    page_size: 50
    max_results: 50
    search_terms:
      - artificial intelligence
      - health
      - robotics
      - bioinformatics
      - climate
      - space
  - id: uk_space_agency_funding
    type: uk_space_agency_funding
    url: https://www.gov.uk/guidance/apply-for-funding-academic-community-and-educational
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: raeng_programmes
    type: raeng_programmes
    url: https://raeng.org.uk/programmes-and-prizes/programmes/uk-grants-and-prizes/support-for-research/
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: royal_society_application_dates
    type: royal_society_application_dates
    url: https://royalsociety.org/grants/application-dates/
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1
  - id: academy_medical_sciences_grants
    type: academy_medical_sciences_grants
    url: https://acmedsci.ac.uk/grants-and-schemes/grant-schemes
    enabled: true
    timeout_seconds: 30
    retry_attempts: 3
    retry_backoff_seconds: 1

filters:
  include_keywords:
    - AI
    - machine learning
    - health
    - NHS
    - digital twin
    - bioinformatics
    - genom*
    - "*omics"
  exclude_keywords:
    - studentship
    - PhD
    - doctoral training
  include_councils: []
  include_funding_types: []
  min_days_until_deadline:

slack:
  webhook_env_var: SLACK_WEBHOOK_URL
  timeout_seconds: 15
  retry_attempts: 3
  retry_backoff_seconds: 1

posting:
  max_posts_per_run: 10
  dry_run: false
  record_non_matches_as_seen: true

llm:
  enabled: false
  # Example for llama.cpp router mode:
  # base_url: http://100.123.170.91:8001/v1
  base_url: http://127.0.0.1:8001/v1
  model: qwen3.6
  timeout_seconds: 60
  max_tokens: 1200
  temperature: 0.1
  retry_attempts: 2
  retry_backoff_seconds: 1.0
  prompt_summary_chars: 600
  group_opportunities: false
  # When true, the LLM classifies each opportunity for relevance
  # before the rule-based filter. Falls back to rules on failure.
  assess_opportunities: false

digest:
  batch_new_opportunities: false
  post_at_hour: 9
  timezone: Europe/London
  post_when_pending_count_reaches: 10

reminders:
  enabled: false
  days_before_deadline: 7
  max_reminders_per_run: 10

storage:
  type: sqlite
  path: data/state.sqlite

log_level: INFO
